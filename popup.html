<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ThatsThem Email Extractor</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>ThatsThem Emails</h1>
      <p class="subtitle">Decode hidden addresses from the current page</p>
    </header>

    <div id="status" class="status" role="status"></div>

    <div class="actions">
      <button id="extractBtn" type="button" class="btn primary">Extract emails</button>
      <button id="copyBtn" type="button" class="btn" disabled>Copy all</button>
      <button id="downloadBtn" type="button" class="btn" disabled>Download JSON</button>
    </div>

    <div id="summary" class="summary hidden"></div>
    <div id="results" class="results"></div>

    <script src="popup.js"></script>
  </body>
</html>
